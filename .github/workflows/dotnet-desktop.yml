name: .NET Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restaurar dependências
        run: dotnet restore AplicacaoGitActions/

      - name: Build
        run: dotnet build AplicacaoGitActions/ --no-restore --configuration Release

      - name: Rodar testes
        run: dotnet test AplicacaoGitActions/ --no-build --configuration Release --verbosity normal
